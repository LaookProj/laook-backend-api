name: CodeQL Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@df5a14dc28ba32436d74122d9006b783f9103e58 # v3
        with:
          languages: 'python'

      - name: Autobuild
        uses: github/codeql-action/autobuild@df5a14dc28ba32436d74122d9006b783f9103e58 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@df5a14dc28ba32436d74122d9006b783f9103e58 # v3
