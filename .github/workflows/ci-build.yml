name: CI Build & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Static Scan & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@39c1b1bc7555ec3a6eb77eab26f5f8b9643d2218 # v5.1.1
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Linting & Testing Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-cov bandit httpx

      - name: Run Black Formatter Check
        run: black --check .

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Bandit Security Linter
        run: bandit -r . -x ./venv,./.venv,./test_main.py -ll

      - name: Run Unit Tests with Coverage
        run: |
          # Install app dependencies
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pytest --cov=. --cov-report=xml

  build:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lowercase Image Name
        shell: bash
        run: |
          echo "IMAGE_NAME=$(echo ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c304f85e49e2d4d291d390a377b4f3fce9fa2263 # v3.8.0

      - name: Build Docker Image (Verify Only)
        uses: docker/build-push-action@ca877d92493a3d537a68fbe333db7a505e606579 # v6.13.0
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
